name: Rollout Gate
description: Run the StreamOS rollout check before promoting a deployment.

inputs:
  environment:
    required: true
    description: "staging | production"
  api-gateway-url:
    required: true
    description: Public API Gateway URL.
  automation-service-url:
    required: false
    default: ""
    description: Automation Service URL.
  expect-private-automation:
    required: false
    default: "false"
    description: Require private automation networking.
  env-file:
    required: false
    default: ".env.test"
    description: >
      Path to the env file consumed by pnpm rolloutcheck. .env.test is the
      only env file present in the repository and is the correct value for all
      environments. Do not change this to .env.staging or .env.production.
  allow-hosted-e2e:
    required: false
    default: "false"
    description: Allow hosted E2E execution.
  gate-timeout-minutes:
    required: false
    default: "10"
    description: Timeout for the rollout gate step.

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml
        node-version: "22"

    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: "9.15.4"

    - name: Install Node dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Run rolloutcheck
      continue-on-error: true
      id: gate
      shell: bash
      timeout-minutes: ${{ inputs.gate-timeout-minutes }}
      env:
        ALLOW_HOSTED_E2E: ${{ inputs.allow-hosted-e2e }}
        API_GATEWAY_URL: ${{ inputs.api-gateway-url }}
        AUTOMATION_SERVICE_URL: ${{ inputs.automation-service-url }}
        ENV_FILE: ${{ inputs.env-file }}
        EXPECT_PRIVATE_AUTOMATION: ${{ inputs.expect-private-automation }}
      run: |
        set -euo pipefail

        args=(
          --env-file "${ENV_FILE}"
          --skip-docker
          --api-gateway-url "${API_GATEWAY_URL}"
        )

        if [ "${ALLOW_HOSTED_E2E}" = "true" ]; then
          args+=(--allow-hosted-e2e)
        fi

        if [ -n "${AUTOMATION_SERVICE_URL}" ]; then
          args+=(--automation-service-url "${AUTOMATION_SERVICE_URL}")
        fi

        if [ "${EXPECT_PRIVATE_AUTOMATION}" = "true" ]; then
          args+=(--expect-private-automation)
        fi

        pnpm rolloutcheck "${args[@]}"

    - name: Write rollout gate summary
      if: always()
      shell: bash
      env:
        GATE_OUTCOME: ${{ steps.gate.outcome }}
        TRIGGERED_BY: ${{ github.actor }}
        RUN_ID: ${{ github.run_id }}
      run: |
        set -euo pipefail

        timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

        if [ "${GATE_OUTCOME}" = "success" ]; then
          cat >> "${GITHUB_STEP_SUMMARY}" <<EOF
          ## Rollout Gate Passed - ${{ inputs.environment }}
          | Field | Value |
          | --- | --- |
          | Environment | ${{ inputs.environment }} |
          | API Gateway URL | ${{ inputs.api-gateway-url }} |
          | Automation Service URL | ${{ inputs.automation-service-url }} |
          | Private Automation | ${{ inputs.expect-private-automation }} |
          | Triggered by | ${TRIGGERED_BY} |
          | Run ID | ${RUN_ID} |
          | Timestamp | ${timestamp} |
          EOF
          exit 0
        fi

        cat >> "${GITHUB_STEP_SUMMARY}" <<EOF
        ## Rollout Gate Failed - ${{ inputs.environment }}
        | Field | Value |
        | --- | --- |
        | Environment | ${{ inputs.environment }} |
        | API Gateway URL | ${{ inputs.api-gateway-url }} |
        | Automation Service URL | ${{ inputs.automation-service-url }} |
        | Private Automation | ${{ inputs.expect-private-automation }} |
        | Triggered by | ${TRIGGERED_BY} |
        | Run ID | ${RUN_ID} |
        | Timestamp | ${timestamp} |

        Action required: Vercel deploy and release creation were skipped.
        Fix the failing gate check and re-trigger the workflow.
        [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
        EOF

    - name: Propagate rollout gate failure
      if: always()
      shell: bash
      run: |
        if [ "${{ steps.gate.outcome }}" != "success" ]; then
          echo "Rollout gate failed. Blocking downstream jobs."
          exit 1
        fi
