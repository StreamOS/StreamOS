name: Rollout Gate
description: Run the StreamOS rollout check before promoting a deployment.

inputs:
  environment:
    description: Target environment name.
    required: true
  api-gateway-url:
    description: Public API Gateway base URL.
    required: true
  automation-service-url:
    description: Automation Service base URL.
    required: true
  allow-hosted-e2e:
    description: Allow hosted Supabase-backed E2E execution.
    default: "false"
    required: false
  env-file:
    description: Env file passed to the rollout gate.
    default: .env.test
    required: false
  expect-private-automation:
    description: Require the automation service URL to be private networking.
    default: "false"
    required: false
  node-version:
    description: Node.js version used for the gate.
    default: "22"
    required: false
  pnpm-version:
    description: pnpm version used for the gate.
    default: "9.15.4"
    required: false

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml
        node-version: ${{ inputs.node-version }}

    - name: Install Node dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Run rollout gate
      shell: bash
      env:
        ALLOW_HOSTED_E2E: ${{ inputs.allow-hosted-e2e }}
        API_GATEWAY_URL: ${{ inputs.api-gateway-url }}
        AUTOMATION_SERVICE_URL: ${{ inputs.automation-service-url }}
        ENV_FILE: ${{ inputs.env-file }}
        EXPECT_PRIVATE_AUTOMATION: ${{ inputs.expect-private-automation }}
        ENVIRONMENT: ${{ inputs.environment }}
      run: |
        set -euo pipefail

        args=(
          --env-file="${ENV_FILE}"
          --skip-docker
          --api-gateway-url="${API_GATEWAY_URL}"
          --automation-service-url="${AUTOMATION_SERVICE_URL}"
        )

        if [ "${ALLOW_HOSTED_E2E}" = "true" ]; then
          args+=(--allow-hosted-e2e)
        fi

        if [ "${EXPECT_PRIVATE_AUTOMATION}" = "true" ]; then
          args+=(--expect-private-automation)
        fi

        log_file="${RUNNER_TEMP}/rollout-check.log"
        rm -f "${log_file}"

        set +e
        pnpm rollout:check -- "${args[@]}" 2>&1 | tee "${log_file}"
        status=${PIPESTATUS[0]}
        set -e

        if [ "${status}" -ne 0 ]; then
          {
            echo "## Rollout Gate Failed - ${ENVIRONMENT}"
            echo ""
            echo "- Environment: ${ENVIRONMENT}"
            echo "- API Gateway URL: ${API_GATEWAY_URL}"
            echo "- Automation Service URL: ${AUTOMATION_SERVICE_URL}"
            echo "- Env file: ${ENV_FILE}"
            echo "- Hosted E2E: ${ALLOW_HOSTED_E2E}"
            echo "- Private automation expected: ${EXPECT_PRIVATE_AUTOMATION}"
            echo ""
            echo "Vercel promotion was blocked."
            echo ""
            echo "### Rollout Output"
            echo ""
            echo '```text'
            tail -n 80 "${log_file}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          exit "${status}"
        fi

        {
          echo "## Rollout Gate Passed - ${ENVIRONMENT}"
          echo ""
          echo "- Environment: ${ENVIRONMENT}"
          echo "- API Gateway URL: ${API_GATEWAY_URL}"
          echo "- Automation Service URL: ${AUTOMATION_SERVICE_URL}"
          echo "- Env file: ${ENV_FILE}"
          echo "- Hosted E2E: ${ALLOW_HOSTED_E2E}"
          echo "- Private automation expected: ${EXPECT_PRIVATE_AUTOMATION}"
        } >> "${GITHUB_STEP_SUMMARY}"
