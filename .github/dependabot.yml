version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:20"
      timezone: Europe/Berlin
    open-pull-requests-limit: 8
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
      - javascript

  - package-ecosystem: pip
    directory: /services/automation-service
    schedule:
      interval: weekly
      day: monday
      time: "05:40"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
