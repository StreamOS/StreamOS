name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint, tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install FastAPI test dependencies
        run: python -m pip install -e "./services/automation-service[dev]"

      - name: Typecheck
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      - name: Database security validation
        run: pnpm db:validate-security

      - name: Gateway integration and webhook tests
        run: pnpm test:gateway

      - name: Unit and integration tests
        run: pnpm test

      - name: FastAPI tests
        run: pnpm test:fastapi

      - name: Build
        run: pnpm build
