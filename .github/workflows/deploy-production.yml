name: CD - Production Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_backend_services:
        description: Deploy Railway backend services and workers
        required: true
        default: true
        type: boolean
      repair_supabase_migration_history:
        description: Mark known orphaned Supabase production migrations as reverted before db push
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  deployments: write

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"
  VERCEL_CLI_VERSION: "52.2.0"
  RAILWAY_CLI_VERSION: "4.58.0"
  RAILWAY_ENVIRONMENT: production
  SUPABASE_CLI_VERSION: "2.102.0"
  PROD_API_GATEWAY_URL: ${{ vars.PROD_API_GATEWAY_URL || vars.API_GATEWAY_URL }}
  PROD_AUTOMATION_SERVICE_URL: ${{ secrets.AUTOMATION_SERVICE_PRIVATE_URL || vars.PROD_AUTOMATION_SERVICE_URL || vars.AUTOMATION_SERVICE_URL }}

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  detect-changes:
    name: Detect deployable backend changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - ci
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      deploy_backend: ${{ steps.detect.outputs.deploy_backend }}
      detection_mode: ${{ steps.detect.outputs.detection_mode }}
      railway_services_json: ${{ steps.detect.outputs.railway_services_json }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Detect changed Railway services
        id: detect
        run: |
          node scripts/detect-deploy-changes.cjs \
            --base "${{ github.event.before }}" \
            --head "${{ github.sha }}" \
            --github-output "${GITHUB_OUTPUT}"

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - detect-changes
      - rollout-gate
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      url: ${{ steps.release.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create release from Conventional Commits
        id: release
        uses: actions/github-script@v9
        with:
          # ADR-3: No release tag before a passing gate.
          script: |
            const { owner, repo } = context.repo;
            const { execSync } = require("node:child_process");

            function run(command) {
              return execSync(command, { encoding: "utf8" }).trim();
            }

            let previousTag = "";
            try {
              previousTag = run("git describe --tags --abbrev=0");
            } catch {
              core.info("No previous release tag found; generating changelog from all commits.");
            }

            const range = previousTag ? `${previousTag}..HEAD` : "HEAD";
            const rawSubjects = run(`git log ${range} --pretty=format:%s`);
            const subjects = rawSubjects ? rawSubjects.split("\n").filter(Boolean) : [];

            const groups = {
              feat: [],
              fix: [],
              refactor: [],
              perf: [],
              security: [],
              docs: [],
              chore: [],
              other: [],
            };

            for (const subject of subjects) {
              const match = subject.match(/^([a-z]+)(?:\([^)]+\))?!?:\s+(.+)$/);
              const type = match?.[1] ?? "other";
              const text = match?.[2] ?? subject;
              const key = Object.hasOwn(groups, type) ? type : "other";
              groups[key].push(text);
            }

            const shortSha = context.sha.slice(0, 7);
            const date = new Date().toISOString().slice(0, 10);
            const runAttempt = process.env.GITHUB_RUN_ATTEMPT ?? "1";
            const tag = `v${date}.${context.runNumber}.${runAttempt}`;
            const title = `StreamOS ${tag}`;
            const sections = [
              ["Features", groups.feat],
              ["Fixes", groups.fix],
              ["Performance", groups.perf],
              ["Security", groups.security],
              ["Refactors", groups.refactor],
              ["Documentation", groups.docs],
              ["Maintenance", groups.chore],
              ["Other Changes", groups.other],
            ];
            const body = [
              `Automated production release for commit \`${shortSha}\`.`,
              "",
              previousTag ? `Changes since \`${previousTag}\`.` : "Initial release changelog.",
              "",
              ...sections.flatMap(([heading, entries]) =>
                entries.length > 0
                  ? [`## ${heading}`, "", ...entries.map((entry) => `- ${entry}`), ""]
                  : [],
              ),
            ].join("\n");

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });

            const { data: release } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: title,
              body,
              draft: false,
              prerelease: false,
              target_commitish: context.sha,
            });

            core.setOutput("tag", tag);
            core.setOutput("url", release.html_url);

  deploy-backend:
    name: Deploy ${{ matrix.service }} to Railway production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - ci
      - detect-changes
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_backend_services) || (github.event_name != 'workflow_dispatch' && needs.detect-changes.outputs.backend == 'true') }}
    environment:
      name: production
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - automation-service
          - clip-worker
          - stream-job-worker
          - transcription-worker
          - content-job-retry-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Railway CLI
        run: npm install --global "@railway/cli@${RAILWAY_CLI_VERSION}"

      - name: Deploy Railway service
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
        run: railway up --ci --project "${RAILWAY_PROJECT_ID}" --environment "${RAILWAY_ENVIRONMENT}" --service "${{ matrix.service }}"

  rollout-gate:
    name: Rollout gate for production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - deploy-backend
    if: ${{ needs.deploy-backend.result == 'success' }}

    steps:
      # ADR-1: Hard pre-promote gate.
      # ADR-3: create-release stays blocked until this passes.
      - name: Run rollout gate
        uses: ./.github/actions/rollout-gate
        with:
          environment: production
          api-gateway-url: ${{ env.PROD_API_GATEWAY_URL }}
          allow-hosted-e2e: "true"
          automation-service-url: ${{ env.PROD_AUTOMATION_SERVICE_URL }}
          expect-private-automation: "true"

  deploy-frontend:
    name: Deploy frontend to Vercel production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - create-release
      - detect-changes
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    if: ${{ needs.create-release.result == 'success' || (needs.create-release.result == 'skipped' && needs.detect-changes.outputs.backend != 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache Vercel build output
        uses: actions/cache@v5
        with:
          path: |
            apps/web/.next/cache
            apps/web/.vercel/cache
          key: ${{ runner.os }}-vercel-production-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**/*', 'apps/web/package.json', 'apps/web/next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-vercel-production-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Pull Vercel production environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Vercel production output
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy prebuilt production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_url="$(vercel deploy --prebuilt --prod --archive=tgz --token="${VERCEL_TOKEN}" | tail -n 1)"
          echo "url=${deployment_url}" >> "${GITHUB_OUTPUT}"
          echo "Production frontend URL: ${deployment_url}" >> "${GITHUB_STEP_SUMMARY}"

  migrate:
    name: Apply Supabase production migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - deploy-frontend
    if: ${{ needs.deploy-frontend.result == 'success' }}
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Repair Supabase production migration history
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.repair_supabase_migration_history }}
        working-directory: packages/database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_PRODUCTION }}
        run: |
          supabase migration repair --status reverted \
            20260531211351 \
            20260601160555 \
            20260601211849 \
            20260601211946 \
            20260602145407 \
            --db-url "${SUPABASE_DB_URL}"

      - name: Mark Supabase production baseline migrations as applied
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.repair_supabase_migration_history }}
        working-directory: packages/database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_PRODUCTION }}
        run: |
          supabase migration repair --status applied \
            0001 \
            0002 \
            0003 \
            0004 \
            0005 \
            --db-url "${SUPABASE_DB_URL}"

      - name: Push Supabase migrations
        working-directory: packages/database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_PRODUCTION }}
        run: supabase db push --db-url "${SUPABASE_DB_URL}"

  notify:
    name: Deployment notification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - ci
      - rollout-gate
      - create-release
      - deploy-frontend
      - deploy-backend
      - migrate
    if: always()

    steps:
      - name: Write GitHub deployment summary
        env:
          CI_RESULT: ${{ needs.ci.result }}
          GATE_RESULT: ${{ needs.rollout-gate.result }}
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
          RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
          RELEASE_URL: ${{ needs.create-release.outputs.url }}
          WEB_URL: ${{ needs.deploy-frontend.outputs.url }}
          BACKEND_RESULT: ${{ needs.deploy-backend.result }}
          MIGRATION_RESULT: ${{ needs.migrate.result }}
          RELEASE_RESULT: ${{ needs.create-release.result }}
        run: |
          release_line="- Release: not created"
          if [ -n "${RELEASE_TAG}" ] && [ -n "${RELEASE_URL}" ]; then
            release_line="- Release: [${RELEASE_TAG}](${RELEASE_URL})"
          fi

          overall="NO-OP"
          if [ "${CI_RESULT}" = "failure" ] || [ "${BACKEND_RESULT}" = "failure" ] || [ "${GATE_RESULT}" = "failure" ] || [ "${RELEASE_RESULT}" = "failure" ] || [ "${FRONTEND_RESULT}" = "failure" ] || [ "${MIGRATION_RESULT}" = "failure" ]; then
            overall="BLOCKED"
          elif [ "${FRONTEND_RESULT}" = "success" ] || [ "${MIGRATION_RESULT}" = "success" ]; then
            overall="PROMOTED"
          fi

          {
            echo "## StreamOS Production Deployment"
            echo ""
            echo "| Step | Status |"
            echo "| --- | --- |"
            echo "| CI | ${CI_RESULT:-skipped} |"
            echo "| Backend Deploy | ${BACKEND_RESULT:-skipped} |"
            echo "| Rollout Gate | ${GATE_RESULT:-skipped} |"
            echo "| Frontend Deploy | ${FRONTEND_RESULT:-skipped} |"
            echo "| DB Migration | ${MIGRATION_RESULT:-skipped} |"
            echo "| Overall | ${overall} |"
            echo ""
            echo "${release_line}"
            echo "- Frontend: ${WEB_URL}"
            echo "- Railway services: ${BACKEND_RESULT}"
            echo "- Supabase migrations: ${MIGRATION_RESULT}"
            echo "- Commit: ${GITHUB_SHA::7}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GATE_RESULT: ${{ needs.rollout-gate.result }}
          RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
          RELEASE_URL: ${{ needs.create-release.outputs.url }}
          WEB_URL: ${{ needs.deploy-frontend.outputs.url }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured; skipping Discord notification."
            exit 0
          fi

          if [ "${GATE_RESULT}" != "success" ]; then
            payload="$(jq -n \
              --arg env "production" \
              --arg web_url "${WEB_URL}" \
              --arg sha "${GITHUB_SHA::7}" \
              --arg actor "${{ github.actor }}" \
              --arg link "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{content: ("Rollout gate failed on " + $env + " - Release tag not created, Vercel deploy skipped.\nTriggered by: " + $actor + " | Run: " + $link)}' \
            )"
          else
            payload="$(jq -n \
              --arg tag "${RELEASE_TAG}" \
              --arg release_url "${RELEASE_URL}" \
              --arg web_url "${WEB_URL}" \
              --arg sha "${GITHUB_SHA::7}" \
              '{content: ("StreamOS production deployed: " + $tag + "\nRelease: " + $release_url + "\nFrontend: " + $web_url + "\nCommit: `" + $sha + "`")}' \
            )"
          fi

          curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${DISCORD_WEBHOOK_URL}"
