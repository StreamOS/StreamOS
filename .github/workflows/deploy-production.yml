name: CD - Production Deployment

on:
  workflow_dispatch:
    inputs:
      deploy_backend_services:
        description: Deploy Railway backend services and workers
        required: true
        default: true
        type: boolean
      deploy_frontend:
        description: Deploy the web app to Vercel production
        required: true
        default: true
        type: boolean
      apply_database_migrations:
        description: Apply Supabase production migrations after deployment
        required: true
        default: true
        type: boolean
      repair_supabase_migration_history:
        description: Mark known orphaned Supabase production migrations as reverted before db push
        required: true
        default: false
        type: boolean
      confirm_production:
        description: Confirm that this run may deploy to production
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  deployments: write

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"
  VERCEL_CLI_VERSION: "52.2.0"
  RAILWAY_CLI_VERSION: "4.58.0"
  RAILWAY_ENVIRONMENT: production
  SUPABASE_CLI_VERSION: "2.102.0"

jobs:
  detect-changes:
    name: Detect deploy targets
    runs-on: ubuntu-latest
    outputs:
      deploy_web: ${{ steps.detect.outputs.deploy_web }}
      deploy_api_gateway: ${{ steps.detect.outputs.deploy_api_gateway }}
      deploy_automation_service: ${{ steps.detect.outputs.deploy_automation_service }}
      deploy_transcription_worker: ${{ steps.detect.outputs.deploy_transcription_worker }}
      deploy_clip_worker: ${{ steps.detect.outputs.deploy_clip_worker }}
      deploy_content_job_retry_worker: ${{ steps.detect.outputs.deploy_content_job_retry_worker }}
      run_migrations: ${{ steps.detect.outputs.run_migrations }}
      has_deployable_changes: ${{ steps.detect.outputs.has_deployable_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed deploy targets
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node scripts/detect-deploy-changes.cjs --force-all
          else
            node scripts/detect-deploy-changes.cjs \
              --base "${{ github.event.before }}" \
              --head "${{ github.sha }}"
          fi

  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  production-approval:
    name: Await production approval
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: ci
    if: ${{ inputs.confirm_production }}
    environment:
      name: production

    steps:
      - name: Validate production request
        env:
          APPLY_DATABASE_MIGRATIONS: ${{ inputs.apply_database_migrations }}
          DEPLOY_BACKEND_SERVICES: ${{ inputs.deploy_backend_services }}
          DEPLOY_FRONTEND: ${{ inputs.deploy_frontend }}
          REPAIR_SUPABASE_MIGRATION_HISTORY: ${{ inputs.repair_supabase_migration_history }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${DEPLOY_BACKEND_SERVICES}" != "true" ] && \
            [ "${DEPLOY_FRONTEND}" != "true" ] && \
            [ "${APPLY_DATABASE_MIGRATIONS}" != "true" ]; then
            echo "::error::Select at least one production action before approving this workflow."
            exit 1
          fi

          if [ "${APPLY_DATABASE_MIGRATIONS}" = "true" ] && [ "${DEPLOY_FRONTEND}" != "true" ]; then
            echo "::error::Production database migrations require deploy_frontend=true in this workflow."
            exit 1
          fi

          if [ "${REPAIR_SUPABASE_MIGRATION_HISTORY}" = "true" ] && \
            [ "${APPLY_DATABASE_MIGRATIONS}" != "true" ]; then
            echo "::error::repair_supabase_migration_history requires apply_database_migrations=true."
            exit 1
          fi

      - name: Record production approval
        env:
          APPLY_DATABASE_MIGRATIONS: ${{ inputs.apply_database_migrations }}
          DEPLOY_BACKEND_SERVICES: ${{ inputs.deploy_backend_services }}
          DEPLOY_FRONTEND: ${{ inputs.deploy_frontend }}
          REPAIR_SUPABASE_MIGRATION_HISTORY: ${{ inputs.repair_supabase_migration_history }}
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## StreamOS Production Approval"
            echo ""
            echo "- Backend services: ${DEPLOY_BACKEND_SERVICES}"
            echo "- Frontend: ${DEPLOY_FRONTEND}"
            echo "- Database migrations: ${APPLY_DATABASE_MIGRATIONS}"
            echo "- Repair migration history: ${REPAIR_SUPABASE_MIGRATION_HISTORY}"
            echo "- Commit: ${GITHUB_SHA::7}"
          } >> "${GITHUB_STEP_SUMMARY}"

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - ci
      - detect-changes
      - production-approval
    if: ${{ needs.ci.result == 'success' && needs.production-approval.result == 'success' && needs.detect-changes.outputs.has_deployable_changes == 'true' }}
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      url: ${{ steps.release.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create release from Conventional Commits
        id: release
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const { execSync } = require("node:child_process");

            function run(command) {
              return execSync(command, { encoding: "utf8" }).trim();
            }

            let previousTag = "";
            try {
              previousTag = run("git describe --tags --abbrev=0");
            } catch {
              core.info("No previous release tag found; generating changelog from all commits.");
            }

            const range = previousTag ? `${previousTag}..HEAD` : "HEAD";
            const rawSubjects = run(`git log ${range} --pretty=format:%s`);
            const subjects = rawSubjects ? rawSubjects.split("\n").filter(Boolean) : [];

            const groups = {
              feat: [],
              fix: [],
              refactor: [],
              perf: [],
              security: [],
              docs: [],
              chore: [],
              other: [],
            };

            for (const subject of subjects) {
              const match = subject.match(/^([a-z]+)(?:\([^)]+\))?!?:\s+(.+)$/);
              const type = match?.[1] ?? "other";
              const text = match?.[2] ?? subject;
              const key = Object.hasOwn(groups, type) ? type : "other";
              groups[key].push(text);
            }

            const shortSha = context.sha.slice(0, 7);
            const date = new Date().toISOString().slice(0, 10);
            const runAttempt = process.env.GITHUB_RUN_ATTEMPT ?? "1";
            const tag = `v${date}.${context.runNumber}.${runAttempt}`;
            const title = `StreamOS ${tag}`;
            const sections = [
              ["Features", groups.feat],
              ["Fixes", groups.fix],
              ["Performance", groups.perf],
              ["Security", groups.security],
              ["Refactors", groups.refactor],
              ["Documentation", groups.docs],
              ["Maintenance", groups.chore],
              ["Other Changes", groups.other],
            ];
            const body = [
              `Automated production release for commit \`${shortSha}\`.`,
              "",
              previousTag ? `Changes since \`${previousTag}\`.` : "Initial release changelog.",
              "",
              ...sections.flatMap(([heading, entries]) =>
                entries.length > 0
                  ? [`## ${heading}`, "", ...entries.map((entry) => `- ${entry}`), ""]
                  : [],
              ),
            ].join("\n");

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });

            const { data: release } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: title,
              body,
              draft: false,
              prerelease: false,
              target_commitish: context.sha,
            });

            core.setOutput("tag", tag);
            core.setOutput("url", release.html_url);

  deploy-railway:
    name: Deploy ${{ matrix.service }} to Railway production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - ci
      - detect-changes
      - production-approval
    if: ${{ inputs.deploy_backend_services && needs.production-approval.result == 'success' }}
    environment:
      name: production
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - automation-service
          - clip-worker
          - transcription-worker
          - content-job-retry-worker

    steps:
      - name: Determine whether service changed
        id: changed
        shell: bash
        run: |
          case "${{ matrix.service }}" in
            api-gateway)
              deploy="${{ needs.detect-changes.outputs.deploy_api_gateway }}"
              ;;
            automation-service)
              deploy="${{ needs.detect-changes.outputs.deploy_automation_service }}"
              ;;
            clip-worker)
              deploy="${{ needs.detect-changes.outputs.deploy_clip_worker }}"
              ;;
            transcription-worker)
              deploy="${{ needs.detect-changes.outputs.deploy_transcription_worker }}"
              ;;
            content-job-retry-worker)
              deploy="${{ needs.detect-changes.outputs.deploy_content_job_retry_worker }}"
              ;;
            *)
              echo "Unknown service mapping: ${{ matrix.service }}" >&2
              exit 1
              ;;
          esac

          echo "deploy=${deploy}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: ${{ steps.changed.outputs.deploy == 'true' }}
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: ${{ steps.changed.outputs.deploy == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Railway CLI
        if: ${{ steps.changed.outputs.deploy == 'true' }}
        run: npm install --global "@railway/cli@${RAILWAY_CLI_VERSION}"

      - name: Deploy Railway service
        if: ${{ steps.changed.outputs.deploy == 'true' }}
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
        run: railway up --ci --project "${RAILWAY_PROJECT_ID}" --environment "${RAILWAY_ENVIRONMENT}" --service "${{ matrix.service }}"

      - name: Skip unchanged service
        if: ${{ steps.changed.outputs.deploy != 'true' }}
        run: echo "Skipping unchanged service ${{ matrix.service }}."

  deploy-web:
    name: Deploy frontend to Vercel production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - detect-changes
      - ci
      - production-approval
      - release
      - deploy-railway
    if: ${{ always() && needs.detect-changes.outputs.deploy_web == 'true' && inputs.deploy_frontend && needs.ci.result == 'success' && needs.production-approval.result == 'success' && needs.release.result == 'success' && (needs.deploy-railway.result == 'success' || needs.deploy-railway.result == 'skipped') }}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache Vercel build output
        uses: actions/cache@v5
        with:
          path: |
            apps/web/.next/cache
            apps/web/.vercel/cache
          key: ${{ runner.os }}-vercel-production-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**/*', 'apps/web/package.json', 'apps/web/next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-vercel-production-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Pull Vercel production environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Vercel production output
        env:
          STREAMOS_REQUIRE_SUPABASE_ENV: "true"
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy prebuilt production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_url="$(vercel deploy --prebuilt --prod --archive=tgz --token="${VERCEL_TOKEN}" | tail -n 1)"
          echo "url=${deployment_url}" >> "${GITHUB_OUTPUT}"
          echo "Production frontend URL: ${deployment_url}" >> "${GITHUB_STEP_SUMMARY}"

  migrate-supabase:
    name: Apply Supabase production migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - detect-changes
      - production-approval
      - deploy-web
      - deploy-railway
    if: ${{ always() && needs.detect-changes.outputs.run_migrations == 'true' && inputs.apply_database_migrations && needs.production-approval.result == 'success' && needs.deploy-web.result == 'success' && (needs.deploy-railway.result == 'success' || needs.deploy-railway.result == 'skipped') }}
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Repair Supabase production migration history
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.repair_supabase_migration_history }}
        working-directory: packages/database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_PRODUCTION }}
        run: |
          supabase migration repair --status reverted \
            20260531211351 \
            20260601160555 \
            20260601211849 \
            20260601211946 \
            20260602145407 \
            --db-url "${SUPABASE_DB_URL}"

      - name: Mark Supabase production baseline migrations as applied
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.repair_supabase_migration_history }}
        working-directory: packages/database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_PRODUCTION }}
        run: |
          supabase migration repair --status applied \
            0001 \
            0002 \
            0003 \
            0004 \
            0005 \
            --db-url "${SUPABASE_DB_URL}"

      - name: Push Supabase migrations
        working-directory: packages/database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_PRODUCTION }}
        run: supabase db push --db-url "${SUPABASE_DB_URL}"

  smoke-production:
    name: Smoke test Vercel production
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - release
      - deploy-web
    if: ${{ always() && inputs.deploy_frontend && needs.release.result == 'success' && needs.deploy-web.result == 'success' }}
    environment:
      name: production

    steps:
      - name: Get Vercel OIDC Token
        uses: actions/github-script@v9
        id: oidc-token
        with:
          script: |
            const token = await core.getIDToken();
            core.setSecret(token);
            core.setOutput("token", token);

      - name: Smoke protected Vercel deployment
        env:
          DEPLOYMENT_URL: ${{ needs.deploy-web.outputs.url }}
        run: |
          set -euo pipefail

          status="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" \
            -H "x-vercel-trusted-oidc-idp-token: ${{ steps.oidc-token.outputs.token }}" \
            "${DEPLOYMENT_URL}/dashboard")"

          if ! [[ "${status}" =~ ^(200|307)$ ]]; then
            echo "::error::Expected /dashboard to return 200 or 307, got ${status}."
            exit 1
          fi

          echo "/dashboard returned ${status}"

  notify:
    name: Deployment notification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - detect-changes
      - production-approval
      - release
      - deploy-web
      - deploy-railway
      - migrate-supabase
      - smoke-production
    if: ${{ always() && needs.detect-changes.outputs.has_deployable_changes == 'true' && needs.production-approval.result == 'success' && (!inputs.deploy_frontend || needs.smoke-production.result == 'success') }}

    steps:
      - name: Write GitHub deployment summary
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
          RELEASE_URL: ${{ needs.release.outputs.url }}
          WEB_URL: ${{ needs.deploy-web.outputs.url }}
          RAILWAY_RESULT: ${{ needs.deploy-railway.result }}
          MIGRATION_RESULT: ${{ needs.migrate-supabase.result }}
        run: |
          {
            echo "## StreamOS Production Deployment"
            echo ""
            echo "- Release: [${RELEASE_TAG}](${RELEASE_URL})"
            echo "- Frontend: ${WEB_URL}"
            echo "- Railway services: ${RAILWAY_RESULT}"
            echo "- Supabase migrations: ${MIGRATION_RESULT}"
            echo "- Commit: ${GITHUB_SHA::7}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
          RELEASE_URL: ${{ needs.release.outputs.url }}
          WEB_URL: ${{ needs.deploy-web.outputs.url }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured; skipping Discord notification."
            exit 0
          fi

          payload="$(jq -n \
            --arg tag "${RELEASE_TAG}" \
            --arg release_url "${RELEASE_URL}" \
            --arg web_url "${WEB_URL}" \
            --arg sha "${GITHUB_SHA::7}" \
            '{content: ("StreamOS production deployed: " + $tag + "\nRelease: " + $release_url + "\nFrontend: " + $web_url + "\nCommit: `" + $sha + "`")}' \
          )"

          curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${DISCORD_WEBHOOK_URL}"
