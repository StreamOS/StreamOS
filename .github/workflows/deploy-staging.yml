name: CD - Staging Deployment

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      deploy_backend_services:
        description: Deploy Railway backend services and workers
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  deployments: write
  issues: write
  pull-requests: read

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"
  VERCEL_CLI_VERSION: "52.2.0"
  RAILWAY_CLI_VERSION: "4.58.0"
  RAILWAY_ENVIRONMENT: staging
  SUPABASE_CLI_VERSION: "2.102.0"

jobs:
  detect-changes:
    name: Detect deploy targets
    runs-on: ubuntu-latest
    outputs:
      deploy_web: ${{ steps.detect.outputs.deploy_web }}
      deploy_api_gateway: ${{ steps.detect.outputs.deploy_api_gateway }}
      deploy_automation_service: ${{ steps.detect.outputs.deploy_automation_service }}
      deploy_transcription_worker: ${{ steps.detect.outputs.deploy_transcription_worker }}
      deploy_clip_worker: ${{ steps.detect.outputs.deploy_clip_worker }}
      deploy_content_job_retry_worker: ${{ steps.detect.outputs.deploy_content_job_retry_worker }}
      run_migrations: ${{ steps.detect.outputs.run_migrations }}
      has_deployable_changes: ${{ steps.detect.outputs.has_deployable_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed deploy targets
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node scripts/detect-deploy-changes.cjs --force-all
          else
            node scripts/detect-deploy-changes.cjs \
              --base "${{ github.event.before }}" \
              --head "${{ github.sha }}"
          fi

  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy-web:
    name: Deploy frontend to Vercel staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - ci
      - detect-changes
    if: ${{ needs.ci.result == 'success' && needs.detect-changes.outputs.deploy_web == 'true' }}
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache Vercel build output
        uses: actions/cache@v5
        with:
          path: |
            apps/web/.next/cache
            apps/web/.vercel/cache
          key: ${{ runner.os }}-vercel-staging-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**/*', 'apps/web/package.json', 'apps/web/next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-vercel-staging-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Pull Vercel preview environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Build Vercel preview output
        env:
          STREAMOS_REQUIRE_SUPABASE_ENV: "true"
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --token="${VERCEL_TOKEN}"

      - name: Deploy prebuilt preview
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_url="$(vercel deploy --prebuilt --archive=tgz --token="${VERCEL_TOKEN}" | tail -n 1)"
          echo "url=${deployment_url}" >> "${GITHUB_OUTPUT}"
          echo "Staging frontend URL: ${deployment_url}" >> "${GITHUB_STEP_SUMMARY}"

  deploy-railway:
    name: Deploy ${{ matrix.service }} to Railway staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - ci
      - detect-changes
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_backend_services }}
    environment:
      name: staging
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - automation-service
          - clip-worker
          - transcription-worker
          - content-job-retry-worker

    steps:
      - name: Determine whether service changed
        id: changed
        shell: bash
        run: |
          case "${{ matrix.service }}" in
            api-gateway)
              deploy="${{ needs.detect-changes.outputs.deploy_api_gateway }}"
              ;;
            automation-service)
              deploy="${{ needs.detect-changes.outputs.deploy_automation_service }}"
              ;;
            clip-worker)
              deploy="${{ needs.detect-changes.outputs.deploy_clip_worker }}"
              ;;
            transcription-worker)
              deploy="${{ needs.detect-changes.outputs.deploy_transcription_worker }}"
              ;;
            content-job-retry-worker)
              deploy="${{ needs.detect-changes.outputs.deploy_content_job_retry_worker }}"
              ;;
            *)
              echo "Unknown service mapping: ${{ matrix.service }}" >&2
              exit 1
              ;;
          esac

          echo "deploy=${deploy}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: ${{ steps.changed.outputs.deploy == 'true' }}
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: ${{ steps.changed.outputs.deploy == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Railway CLI
        if: ${{ steps.changed.outputs.deploy == 'true' }}
        run: npm install --global "@railway/cli@${RAILWAY_CLI_VERSION}"

      - name: Deploy Railway service
        if: ${{ steps.changed.outputs.deploy == 'true' }}
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: railway up --ci --project "${RAILWAY_PROJECT_ID}" --environment "${RAILWAY_ENVIRONMENT}" --service "${{ matrix.service }}"

      - name: Skip unchanged service
        if: ${{ steps.changed.outputs.deploy != 'true' }}
        run: echo "Skipping unchanged service ${{ matrix.service }}."

  migrate-supabase:
    name: Apply Supabase staging migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - detect-changes
      - deploy-web
      - deploy-railway
    if: ${{ always() && needs.detect-changes.outputs.run_migrations == 'true' && (needs.deploy-web.result == 'success' || needs.deploy-web.result == 'skipped') && (needs.deploy-railway.result == 'success' || needs.deploy-railway.result == 'skipped') }}
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Push Supabase migrations
        working-directory: packages/database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_STAGING }}
        run: supabase db push --db-url "${SUPABASE_DB_URL}"

  comment-pr:
    name: Comment deployment URL on PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - deploy-web
      - deploy-railway
      - migrate-supabase
    if: ${{ always() && needs.deploy-web.result == 'success' && (needs.migrate-supabase.result == 'success' || needs.migrate-supabase.result == 'skipped') }}

    steps:
      - name: Comment on associated pull request
        uses: actions/github-script@v9
        env:
          DEPLOYMENT_URL: ${{ needs.deploy-web.outputs.url }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: context.sha,
            });

            if (pulls.length === 0) {
              core.info("No associated pull request found for this staging deployment.");
              return;
            }

            const body = [
              "## StreamOS Staging Deployment",
              "",
              `- Frontend: ${process.env.DEPLOYMENT_URL}`,
              "- Railway services: staging deploy completed",
              "- Supabase migrations: staging database updated",
              `- Commit: \`${context.sha.slice(0, 7)}\``,
            ].join("\n");

            for (const pull of pulls) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull.number,
                body,
              });
            }

  notify:
    name: Deployment notification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - detect-changes
      - deploy-web
      - deploy-railway
      - migrate-supabase
    if: ${{ always() && needs.detect-changes.outputs.has_deployable_changes == 'true' }}

    steps:
      - name: Write GitHub deployment summary
        env:
          WEB_URL: ${{ needs.deploy-web.outputs.url }}
          RAILWAY_RESULT: ${{ needs.deploy-railway.result }}
          MIGRATION_RESULT: ${{ needs.migrate-supabase.result }}
        run: |
          {
            echo "## StreamOS Staging Deployment"
            echo ""
            echo "- Frontend: ${WEB_URL}"
            echo "- Railway services: ${RAILWAY_RESULT}"
            echo "- Supabase migrations: ${MIGRATION_RESULT}"
            echo "- Commit: ${GITHUB_SHA::7}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WEB_URL: ${{ needs.deploy-web.outputs.url }}
          RAILWAY_RESULT: ${{ needs.deploy-railway.result }}
          MIGRATION_RESULT: ${{ needs.migrate-supabase.result }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured; skipping Discord notification."
            exit 0
          fi

          payload="$(jq -n \
            --arg web_url "${WEB_URL}" \
            --arg railway_result "${RAILWAY_RESULT}" \
            --arg migration_result "${MIGRATION_RESULT}" \
            --arg sha "${GITHUB_SHA::7}" \
            '{content: ("StreamOS staging deployed\nFrontend: " + $web_url + "\nRailway services: " + $railway_result + "\nSupabase migrations: " + $migration_result + "\nCommit: `" + $sha + "`")}' \
          )"

          curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${DISCORD_WEBHOOK_URL}"
