name: CD - Staging Deployment

on:
  push:
    branches:
      - "release/*"
  workflow_dispatch:
    inputs:
      deploy_backend_services:
        description: Deploy Railway backend services, workers, and release-gate-runner
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  deployments: write
  issues: write
  pull-requests: read

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "11.7.0"
  VERCEL_CLI_VERSION: "54.10.3"
  RAILWAY_CLI_VERSION: "4.58.0"
  RAILWAY_ENVIRONMENT: staging
  SUPABASE_CLI_VERSION: "2.102.0"

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy-web:
    name: Deploy frontend to Vercel staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Pull Vercel preview environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=preview --git-branch="${GITHUB_REF_NAME}" --token="${VERCEL_TOKEN}"

      - name: Audit Vercel preview environment
        run: pnpm vercel:audit -- --vercel-dir .vercel --environment preview

      - name: Deploy preview on Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_url="$(vercel deploy --archive=tgz --token="${VERCEL_TOKEN}" | tail -n 1)"
          echo "url=${deployment_url}" >> "${GITHUB_OUTPUT}"
          echo "Staging frontend URL: ${deployment_url}" >> "${GITHUB_STEP_SUMMARY}"

  deploy-railway:
    name: Deploy ${{ matrix.service }} to Railway staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_backend_services }}
    environment:
      name: staging
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - automation-service
          - stream-job-worker
          - repurposing-worker
          - publishing-worker
          - clip-worker
          - transcription-worker
          - content-job-retry-worker
          - release-gate-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Stamp api-gateway runtime provenance
        if: ${{ matrix.service == 'api-gateway' }}
        shell: bash
        run: |
          set -euo pipefail

          git_sha="$(git rev-parse HEAD)"

          node scripts/write-api-gateway-runtime-provenance.cjs \
            --git-sha "${git_sha}" \
            --git-ref "${GITHUB_REF}" \
            --environment "${RAILWAY_ENVIRONMENT}" \
            --repository "${GITHUB_REPOSITORY}" \
            --workflow "${GITHUB_WORKFLOW}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"

          {
            echo "## api-gateway deploy provenance"
            echo ""
            echo "- Environment: ${RAILWAY_ENVIRONMENT}"
            echo "- Service: api-gateway"
            echo "- Commit: \`${git_sha}\`"
            echo "- Runtime marker: \`services/api-gateway/runtime-provenance.json\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Stamp release-gate-runner provenance
        if: ${{ matrix.service == 'release-gate-runner' }}
        shell: bash
        run: |
          set -euo pipefail

          git_sha="$(git rev-parse HEAD)"

          node scripts/write-release-gate-runner-provenance.cjs \
            --git-sha "${git_sha}" \
            --git-ref "${GITHUB_REF}" \
            --environment "${RAILWAY_ENVIRONMENT}" \
            --repository "${GITHUB_REPOSITORY}" \
            --workflow "${GITHUB_WORKFLOW}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"

          contract_hash="$(node -e "const p=require('./scripts/.release-gate-runner-provenance.json'); process.stdout.write(p.gateContract.contractHash.slice(0, 12))")"

          {
            echo "## release-gate-runner deploy provenance"
            echo ""
            echo "- Environment: ${RAILWAY_ENVIRONMENT}"
            echo "- Service: release-gate-runner"
            echo "- Commit: \`${git_sha}\`"
            echo "- Gate contract hash: \`${contract_hash}\`"
            echo "- Snapshot marker: \`scripts/.release-gate-runner-provenance.json\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Provision publishing-worker when missing
        if: ${{ matrix.service == 'publishing-worker' }}
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016

          npm install --global "@railway/cli@${RAILWAY_CLI_VERSION}"

          service_list="$(railway service list --project "${RAILWAY_PROJECT_ID}" --environment "${RAILWAY_ENVIRONMENT}" --json)"
          if printf '%s' "${service_list}" | jq -e 'if type == "array" then . elif has("services") then .services else [] end | any(.name == "publishing-worker")' >/dev/null; then
            service_exists="yes"
          else
            service_exists="no"
          fi

          if [ "${service_exists}" = "yes" ]; then
            echo "publishing-worker already exists in Railway staging." >> "${GITHUB_STEP_SUMMARY}"
          else
            railway_service_response="$(
              SERVICE_NAME=publishing-worker node scripts/railway-service-create.cjs
            )"
            publishing_worker_service_id="$(printf '%s' "${railway_service_response}" | jq -r '.id')"

            {
              echo "## publishing-worker provisioning"
              echo ""
              echo "- Environment: ${RAILWAY_ENVIRONMENT}"
              echo "- Service: publishing-worker"
              echo "- Source: empty service created in the existing project"
              echo "- Service ID: \`${publishing_worker_service_id}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

          railway variable set \
            --project "${RAILWAY_PROJECT_ID}" \
            --service publishing-worker \
            --environment "${RAILWAY_ENVIRONMENT}" \
            --skip-deploys \
            RAILWAY_DOCKERFILE_PATH=Dockerfile.publishing-worker \
            --json >/tmp/railway-set-publishing-worker.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Railway CLI
        run: npm install --global "@railway/cli@${RAILWAY_CLI_VERSION}"

      - name: Deploy Railway service
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ matrix.service }}" = "release-gate-runner" ]; then
            railway up --ci --no-gitignore --project "${RAILWAY_PROJECT_ID}" --environment "${RAILWAY_ENVIRONMENT}" --service "${{ matrix.service }}"
            exit 0
          fi

          railway up --ci --project "${RAILWAY_PROJECT_ID}" --environment "${RAILWAY_ENVIRONMENT}" --service "${{ matrix.service }}"

  migrate-supabase:
    name: Apply Supabase staging migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - deploy-web
      - deploy-railway
    if: ${{ always() && needs.deploy-web.result == 'success' && (needs.deploy-railway.result == 'success' || needs.deploy-railway.result == 'skipped') }}
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Push Supabase migrations
        working-directory: packages/database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_STAGING }}
        run: supabase db push --db-url "${SUPABASE_DB_URL}"

  smoke-staging:
    name: Smoke test Vercel staging
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - deploy-web
      - deploy-railway
      - migrate-supabase
    if: ${{ always() && needs.deploy-web.result == 'success' && needs.migrate-supabase.result == 'success' }}
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Vercel CLI
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Link Vercel project
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel link --yes \
            --project "${VERCEL_PROJECT_ID}" \
            --team "${VERCEL_ORG_ID}" \
            --token="${VERCEL_TOKEN}"

      - name: Smoke protected Vercel deployment
        env:
          DEPLOYMENT_URL: ${{ needs.deploy-web.outputs.url }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail

          check_status() {
            local path="$1"
            local expected_status="$2"
            local status

            if ! status="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" "${DEPLOYMENT_URL}${path}" 2>smoke.stderr)"; then
              cat smoke.stderr
              exit 1
            fi

            if [ "${status}" != "${expected_status}" ]; then
              echo "::error::Expected ${path} to return ${expected_status}, got ${status}."
              cat smoke.stderr
              exit 1
            fi

            echo "${path} returned ${status}"
          }

          check_status "/dashboard" "307"
          check_status "/api/gateway-connect?provider=twitch" "401"
          check_status "/api/admin/queues" "404"
          check_status "/api/cron/youtube-websub-renew" "410"
          check_status "/api/webhooks/youtube/websub" "410"

  comment-pr:
    name: Comment deployment URL on PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - deploy-web
      - deploy-railway
      - migrate-supabase
      - smoke-staging
    if: ${{ always() && needs.deploy-web.result == 'success' && needs.migrate-supabase.result == 'success' && needs.smoke-staging.result == 'success' }}

    steps:
      - name: Comment on associated pull request
        uses: actions/github-script@v9
        env:
          DEPLOYMENT_URL: ${{ needs.deploy-web.outputs.url }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: context.sha,
            });

            const openPulls = pulls.filter((pull) => pull.state === "open");

            if (openPulls.length === 0) {
              core.info("No open associated pull request found for this staging deployment.");
              return;
            }

            const body = [
              "## StreamOS Staging Deployment",
              "",
              `- Frontend: ${process.env.DEPLOYMENT_URL}`,
              "- Railway services: staging deploy completed, including release-gate-runner",
              "- Supabase migrations: staging database updated",
              "- Release gate: run only from release-gate-runner in the same staging environment; generic shell services are not valid proof runtimes",
              `- Commit: \`${context.sha.slice(0, 7)}\``,
            ].join("\n");

            for (const pull of openPulls) {
              try {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pull.number,
                  body,
                });
              } catch (error) {
                core.warning(
                  `Skipping staging deployment comment for PR #${pull.number}: ${
                    error instanceof Error ? error.message : String(error)
                  }`,
                );
              }
            }
