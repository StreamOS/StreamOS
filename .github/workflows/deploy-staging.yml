name: CD - Staging Deployment

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      deploy_backend_services:
        description: Deploy Railway backend services and workers
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  deployments: write
  issues: write
  pull-requests: read

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"
  VERCEL_CLI_VERSION: "52.2.0"
  RAILWAY_CLI_VERSION: "4.58.0"
  RAILWAY_ENVIRONMENT: staging
  SUPABASE_CLI_VERSION: "2.102.0"

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy-web:
    name: Deploy frontend to Vercel staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache Vercel build output
        uses: actions/cache@v5
        with:
          path: |
            apps/web/.next/cache
            apps/web/.vercel/cache
          key: ${{ runner.os }}-vercel-staging-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**/*', 'apps/web/package.json', 'apps/web/next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-vercel-staging-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Pull Vercel preview environment
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel --cwd apps/web pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Build Vercel preview output
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel --cwd apps/web build --token="${VERCEL_TOKEN}"

      - name: Deploy prebuilt preview
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_url="$(vercel --cwd apps/web deploy --prebuilt --archive=tgz --token="${VERCEL_TOKEN}" | tail -n 1)"
          echo "url=${deployment_url}" >> "${GITHUB_OUTPUT}"
          echo "Staging frontend URL: ${deployment_url}" >> "${GITHUB_STEP_SUMMARY}"

  deploy-railway:
    name: Deploy ${{ matrix.service }} to Railway staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_backend_services }}
    environment:
      name: staging
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - automation-service
          - clip-worker
          - transcription-worker
          - content-job-retry-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Railway CLI
        run: npm install --global "@railway/cli@${RAILWAY_CLI_VERSION}"

      - name: Deploy Railway service
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: railway up --ci --project "${RAILWAY_PROJECT_ID}" --environment "${RAILWAY_ENVIRONMENT}" --service "${{ matrix.service }}"

  migrate-supabase:
    name: Apply Supabase staging migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - deploy-web
      - deploy-railway
    if: ${{ always() && needs.deploy-web.result == 'success' && (needs.deploy-railway.result == 'success' || needs.deploy-railway.result == 'skipped') }}
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Diagnose Supabase staging DB URL
        id: supabase-db
        env:
          SUPABASE_DB_URL_RAW: ${{ secrets.SUPABASE_DB_URL_STAGING }}
        run: |
          set -euo pipefail

          raw="${SUPABASE_DB_URL_RAW-}"
          present="yes"
          whitespace_issue="no"
          quote_issue="no"
          prefix_ok="no"

          if [ -z "${raw}" ]; then
            present="no"
          fi

          cleaned="$(printf '%s' "${raw}" | perl -0pe 's/\x{FEFF}//g; s/[\x{200B}\x{200C}\x{200D}]//g; s/^[\s`]+//; s/[\s`]+$//' | tr -d '\r\n')"

          if [ "${raw}" != "${cleaned}" ]; then
            whitespace_issue="yes"
          fi

          case "${raw}" in
            *[[:space:]]*)
              whitespace_issue="yes"
              ;;
          esac

          without_quotes="${cleaned}"
          stripped="${without_quotes#\"}"
          stripped="${stripped%\"}"
          if [ "${stripped}" != "${without_quotes}" ]; then
            quote_issue="yes"
            without_quotes="${stripped}"
          fi

          stripped="${without_quotes#\'}"
          stripped="${stripped%\'}"
          if [ "${stripped}" != "${without_quotes}" ]; then
            quote_issue="yes"
            without_quotes="${stripped}"
          fi

          url_without_scheme="${without_quotes#*://}"
          host_port_and_path="${url_without_scheme#*@}"
          host_port="${host_port_and_path%%/*}"
          host="${host_port%%:*}"
          direct_host="no"
          if printf '%s' "${host}" | grep -Eq '^db\.[^.]+\.supabase\.co$'; then
            direct_host="yes"
          fi

          case "${without_quotes}" in
            postgres://*|postgresql://*)
              prefix_ok="yes"
              ;;
          esac

          {
            echo "## Supabase Staging DB URL Diagnostics"
            echo ""
            echo "| Check | Value |"
            echo "| --- | --- |"
            echo "| Present in staging | ${present} |"
            echo "| Raw length | ${#raw} |"
            echo "| Normalized length | ${#without_quotes} |"
            echo "| Contains leading/trailing whitespace or other whitespace | ${whitespace_issue} |"
            echo "| Wrapped in quotes | ${quote_issue} |"
            echo "| Starts with postgres:// or postgresql:// | ${prefix_ok} |"
            echo "| Direct db host | ${direct_host} |"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${present}" != "yes" ]; then
            echo "SUPABASE_DB_URL_STAGING is missing in the staging environment scope." >&2
            exit 1
          fi

          if [ "${prefix_ok}" != "yes" ]; then
            echo "SUPABASE_DB_URL_STAGING must be a postgres connection string." >&2
            exit 1
          fi

          if [ "${direct_host}" = "yes" ]; then
            echo "SUPABASE_DB_URL_STAGING points at Supabase's direct db host, which is IPv6-only. GitHub-hosted Actions runners are IPv4-only. Replace it with the Session pooler connection string or enable the Supabase IPv4 add-on." >&2
            exit 1
          fi

          echo "db_url=${without_quotes}" >> "${GITHUB_OUTPUT}"

      - name: Push Supabase migrations
        working-directory: packages/database
        env:
          SUPABASE_DB_URL: ${{ steps.supabase-db.outputs.db_url }}
        run: supabase db push --db-url "${SUPABASE_DB_URL}"

  comment-pr:
    name: Comment deployment URL on PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - deploy-web
      - deploy-railway
      - migrate-supabase
    if: ${{ always() && needs.deploy-web.result == 'success' && needs.migrate-supabase.result == 'success' }}

    steps:
      - name: Comment on associated pull request
        uses: actions/github-script@v9
        env:
          DEPLOYMENT_URL: ${{ needs.deploy-web.outputs.url }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: context.sha,
            });

            if (pulls.length === 0) {
              core.info("No associated pull request found for this staging deployment.");
              return;
            }

            const body = [
              "## StreamOS Staging Deployment",
              "",
              `- Frontend: ${process.env.DEPLOYMENT_URL}`,
              "- Railway services: staging deploy completed",
              "- Supabase migrations: staging database updated",
              `- Commit: \`${context.sha.slice(0, 7)}\``,
            ].join("\n");

            for (const pull of pulls) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull.number,
                body,
              });
            }
