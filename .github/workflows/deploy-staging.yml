name: CD - Staging Deployment

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      deploy_backend_services:
        description: Deploy Railway backend services and workers
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  deployments: write
  issues: write
  pull-requests: read

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"
  VERCEL_CLI_VERSION: "52.2.0"
  RAILWAY_CLI_VERSION: "4.58.0"
  RAILWAY_ENVIRONMENT: staging
  SUPABASE_CLI_VERSION: "2.102.0"
  STAGING_API_GATEWAY_URL: ${{ vars.STAGING_API_GATEWAY_URL || vars.API_GATEWAY_URL }}
  STAGING_AUTOMATION_SERVICE_URL: ${{ vars.STAGING_AUTOMATION_SERVICE_URL || vars.AUTOMATION_SERVICE_URL }}

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  detect-changes:
    name: Detect deployable backend changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - ci
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      deploy_backend: ${{ steps.detect.outputs.deploy_backend }}
      detection_mode: ${{ steps.detect.outputs.detection_mode }}
      railway_services_json: ${{ steps.detect.outputs.railway_services_json }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Detect changed Railway services
        id: detect
        run: |
          node scripts/detect-deploy-changes.cjs \
            --base "${{ github.event.before }}" \
            --head "${{ github.sha }}" \
            --github-output "${GITHUB_OUTPUT}"

  deploy-frontend:
    name: Deploy frontend to Vercel staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - detect-changes
      - rollout-gate
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    # Gate skipped: backend unchanged, previously gated ref.
    if: ${{ needs.rollout-gate.result == 'success' || (needs.rollout-gate.result == 'skipped' && needs.detect-changes.outputs.backend != 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache Vercel build output
        uses: actions/cache@v5
        with:
          path: |
            apps/web/.next/cache
            .vercel/cache
          key: ${{ runner.os }}-vercel-staging-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**/*', 'apps/web/package.json', 'apps/web/next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-vercel-staging-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Pull Vercel preview environment
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Build Vercel preview output
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --token="${VERCEL_TOKEN}"

      - name: Deploy prebuilt preview
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_url="$(vercel deploy --prebuilt --archive=tgz --token="${VERCEL_TOKEN}" | tail -n 1)"
          echo "url=${deployment_url}" >> "${GITHUB_OUTPUT}"
          echo "Staging frontend URL: ${deployment_url}" >> "${GITHUB_STEP_SUMMARY}"

  deploy-backend:
    name: Deploy ${{ matrix.service }} to Railway staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - ci
      - detect-changes
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_backend_services) || (github.event_name != 'workflow_dispatch' && needs.detect-changes.outputs.backend == 'true') }}
    environment:
      name: staging
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - automation-service
          - clip-worker
          - stream-job-worker
          - transcription-worker
          - content-job-retry-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Railway CLI
        run: npm install --global "@railway/cli@${RAILWAY_CLI_VERSION}"

      - name: Deploy Railway service
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: railway up --ci --project "${RAILWAY_PROJECT_ID}" --environment "${RAILWAY_ENVIRONMENT}" --service "${{ matrix.service }}"

  rollout-gate:
    name: Rollout gate for staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - deploy-backend
    if: ${{ needs.deploy-backend.result == 'success' }}

    steps:
      # ADR-1: Hard pre-promote gate.
      # ADR-2: deploy-frontend stays blocked until this passes.
      - name: Run rollout gate
        uses: ./.github/actions/rollout-gate
        with:
          environment: staging
          api-gateway-url: ${{ env.STAGING_API_GATEWAY_URL }}
          allow-hosted-e2e: "true"
          automation-service-url: ${{ env.STAGING_AUTOMATION_SERVICE_URL }}
          expect-private-automation: "false"

  migrate:
    name: Apply Supabase staging migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - deploy-frontend
    if: ${{ needs.deploy-frontend.result == 'success' }}
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Prepare Supabase staging DB URL
        id: supabase-db
        env:
          SUPABASE_DB_URL_RAW: ${{ secrets.SUPABASE_DB_URL_STAGING }}
        run: |
          set -euo pipefail

          cleaned="$(printf '%s' "${SUPABASE_DB_URL_RAW}" | tr -d '\r\n')"
          cleaned="${cleaned#\"}"
          cleaned="${cleaned%\"}"
          cleaned="${cleaned#\'}"
          cleaned="${cleaned%\'}"

          if [ -z "${cleaned}" ]; then
            echo "SUPABASE_DB_URL_STAGING is empty after normalization." >&2
            exit 1
          fi

          case "${cleaned}" in
            postgres://*|postgresql://*) ;;
            *)
              echo "SUPABASE_DB_URL_STAGING must be a postgres connection string." >&2
              exit 1
              ;;
          esac

          echo "db_url=${cleaned}" >> "${GITHUB_OUTPUT}"

      - name: Push Supabase migrations
        working-directory: packages/database
        env:
          SUPABASE_DB_URL: ${{ steps.supabase-db.outputs.db_url }}
        run: supabase db push --db-url "${SUPABASE_DB_URL}"

  notify:
    name: Notify deployment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - ci
      - deploy-backend
      - rollout-gate
      - deploy-frontend
      - migrate
    if: always()

    steps:
      - name: Write deployment summary
        env:
          CI_RESULT: ${{ needs.ci.result }}
          BACKEND_RESULT: ${{ needs.deploy-backend.result }}
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
          GATE_RESULT: ${{ needs.rollout-gate.result }}
          MIGRATION_RESULT: ${{ needs.migrate.result }}
        run: |
          overall="NO-OP"
          if [ "${CI_RESULT}" = "failure" ] || [ "${BACKEND_RESULT}" = "failure" ] || [ "${GATE_RESULT}" = "failure" ] || [ "${FRONTEND_RESULT}" = "failure" ] || [ "${MIGRATION_RESULT}" = "failure" ]; then
            overall="BLOCKED"
          elif [ "${FRONTEND_RESULT}" = "success" ] || [ "${MIGRATION_RESULT}" = "success" ]; then
            overall="PROMOTED"
          fi

          {
            echo "## StreamOS Staging Deployment"
            echo ""
            echo "| Step | Status |"
            echo "| --- | --- |"
            echo "| CI | ${CI_RESULT:-skipped} |"
            echo "| Backend Deploy | ${BACKEND_RESULT:-skipped} |"
            echo "| Rollout Gate | ${GATE_RESULT:-skipped} |"
            echo "| Frontend Deploy | ${FRONTEND_RESULT:-skipped} |"
            echo "| DB Migration | ${MIGRATION_RESULT:-skipped} |"
            echo "| Overall | ${overall} |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Comment on associated pull request
        uses: actions/github-script@v9
        env:
          DEPLOYMENT_URL: ${{ needs.deploy-frontend.outputs.url }}
          BACKEND_RESULT: ${{ needs.deploy-backend.result }}
          GATE_RESULT: ${{ needs.rollout-gate.result }}
          MIGRATION_RESULT: ${{ needs.migrate.result }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: context.sha,
            });

            if (pulls.length === 0) {
              core.info("No associated pull request found for this staging deployment.");
              return;
            }

            const body = [
              "## StreamOS Staging Deployment",
              "",
              `- Frontend: ${process.env.DEPLOYMENT_URL}`,
              `- Rollout gate: ${process.env.GATE_RESULT ?? "unknown"}`,
              `- Railway services: ${process.env.BACKEND_RESULT ?? "unknown"}`,
              `- Supabase migrations: ${process.env.MIGRATION_RESULT ?? "unknown"}`,
              `- Commit: \`${context.sha.slice(0, 7)}\``,
            ].join("\n");

            for (const pull of pulls) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull.number,
                body,
              });
            }

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BACKEND_RESULT: ${{ needs.deploy-backend.result }}
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
          GATE_RESULT: ${{ needs.rollout-gate.result }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured; skipping Discord notification."
            exit 0
          fi

          if [ "${GATE_RESULT}" = "failure" ]; then
            payload="$(jq -n \
              --arg env "staging" \
              --arg actor "${{ github.actor }}" \
              --arg link "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{content: ("Rollout gate failed on " + $env + " - Vercel deploy skipped.\nTriggered by: " + $actor + " | Run: " + $link)}' \
            )"
            curl --fail --silent --show-error \
              -H "Content-Type: application/json" \
              -d "${payload}" \
              "${DISCORD_WEBHOOK_URL}"
          fi
