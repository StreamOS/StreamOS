name: Lint workflows

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-workflows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lint GitHub Actions workflows
        uses: raven-actions/actionlint@v2
        with:
          files: ".github/workflows/**/*.yml, .github/workflows/**/*.yaml, .github/actions/**/*.yml, .github/actions/**/*.yaml"
