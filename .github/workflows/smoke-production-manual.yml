name: Production Vercel Smoke (Manual)

on:
  workflow_dispatch:

env:
  VERCEL_CLI_VERSION: "54.10.3"

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke protected Vercel production
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Vercel CLI
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Pull Vercel production environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Production Smoke
        env:
          PROD_APP_URL: ${{ vars.PROD_APP_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PROD_APP_URL}" ]; then
            echo "::error::PROD_APP_URL repository variable is not configured."
            exit 1
          fi

          check_status() {
            local path="$1"
            local expected_pattern="$2"
            local response_file="smoke.response.json"
            local status

            if ! vercel curl "${path}" --deployment "${PROD_APP_URL}" --trace --json --yes >"${response_file}" 2>smoke.stderr; then
              cat smoke.stderr
              exit 1
            fi

            if ! status="$(node -e 'const fs = require("node:fs"); const payload = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); const code = payload?.response?.status ?? payload?.response?.statusCode ?? payload?.status; if (code === undefined || code === null || code === "") process.exit(2); process.stdout.write(String(code));' "${response_file}")"; then
              echo "::error::Unable to parse Vercel smoke response for ${path}."
              cat smoke.stderr
              cat "${response_file}"
              exit 1
            fi

            if ! [[ "${status}" =~ ${expected_pattern} ]]; then
              echo "::error::Expected ${path} to match ${expected_pattern}, got ${status}."
              cat smoke.stderr
              cat "${response_file}"
              exit 1
            fi

            echo "${path} returned ${status}"
          }

          check_status "/dashboard" "^(200|307)$"
          check_status "/api/admin/queues" "^404$"

      - name: Write Step Summary
        if: always()
        env:
          PROD_APP_URL: ${{ vars.PROD_APP_URL }}
        run: |
          {
            echo "## Production Vercel Smoke"
            echo "- Triggered manually at: $(date -u)"
            echo "- Target: ${PROD_APP_URL}"
          } >> "${GITHUB_STEP_SUMMARY}"
